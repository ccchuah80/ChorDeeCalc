<tfoot class="bg-white">
    <tr>
        <td colspan="10" class="p-0 border-t-2 border-indigo-100">
            <div class="flex flex-wrap justify-between items-center px-4 py-2 text-[10px] text-gray-500 font-medium tracking-tight gap-y-2">
                
                <div class="text-indigo-400">
                    Date: <span class="text-gray-800 font-bold" x-text="settings.date || '---'"></span>
                </div>

                <div class="flex flex-wrap gap-4">
                    <div class="flex items-center gap-1">
                        <span class="text-indigo-400">Weight/ card:</span>
                        <span class="text-gray-800 font-bold" x-text="settings.weight"></span>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="text-indigo-400">BASE Amount:</span>
                        <span class="text-gray-800 font-bold" x-text="settings.baseAmount"></span>
                    </div>
                    <template x-if="settings.includeBaseInMult">
                        <span class="bg-indigo-50 text-indigo-600 px-1 rounded border border-indigo-100 italic">Base Included in Mult</span>
                    </template>
                </div>

                <div class="flex gap-4 border-l border-gray-200 pl-4">
                    <span><strong class="text-indigo-400">x2</strong> <span class="text-gray-800" x-text="'≥' + settings.x2"></span></span>
                    <span><strong class="text-indigo-400">x3</strong> <span class="text-gray-800" x-text="'≥' + settings.x3"></span></span>
                    <span>
                        <strong class="text-indigo-400">x4</strong> 
                        <span class="text-gray-800" x-text="settings.x4 > 13 ? 'N/A' : '≥' + settings.x4"></span>
                    </span>
                </div>
            </div>
        </td>
    </tr>
</tfoot>
